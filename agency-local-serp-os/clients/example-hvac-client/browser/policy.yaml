version: 1
enabled: true                      # KILL SWITCH for this client's browser lane
defaults:
  require_human_approval_for_customer_facing: true
  require_screenshot_evidence: true
  retry_customer_facing: false     # never blind-retry a public post
  intra_workflow_jitter_seconds: [4, 15]
  fail_closed: true
allowed_action_classes:
  - read_only_serp_observation
  - read_only_social_scan
  - organic_community_engagement   # daily human-like warming/engagement (ungated, strictly organic)
  - social_posting
  - client_owned_video_publishing_after_approval
  - client_owned_content_publishing_after_approval
# RISK TIER: every public post/upload -> ALWAYS the human gate, even if a workflow forgets
# to set customer_facing (defense in depth).
human_gate_action_classes:
  - social_posting
  - client_owned_video_publishing_after_approval
  - client_owned_content_publishing_after_approval
blocked_action_classes:
  - fake_reviews
  - review_gating
  - fake_engagement
  - vote_manipulation
  - unsolicited_bulk_messaging
  - captcha_bypass
  - verification_bypass
  - platform_policy_evasion
  - scraping_private_data
  - actions_on_non_client_accounts
