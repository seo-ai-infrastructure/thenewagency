version: 1
schedules:
- schedule_id: daily_profile_healthcheck
  workflow_id: mobile_profile_healthcheck
  frequency: daily
  profiles:
  - profile_001
  - profile_002
  - profile_003
  execution_policy: sequential_per_phone
  cooldown_seconds_between_profiles: 300
  active: true
- schedule_id: weekly_approved_content_post
  workflow_id: approved_content_post
  frequency: weekly
  day_of_week: monday
  profiles:
  - profile_001
  - profile_002
  execution_policy: sequential_per_phone
  requires_approval_artifact: true
  active: true
- schedule_id: weekly_gbp_post
  workflow_id: gbp_post_publish
  frequency: weekly
  day_of_week: monday
  gbp_locations:
  - "14079618992035666030"       # Smiley Drain — matches google_business.yaml default_location_id
  requires_approval_artifact: true
  # DISABLED: the generic scheduler issues WEEK-period work orders, but GBP approvals from
  # gen_gbp_posts are DATE-period (the daily drip). Using both caused "approval artifact missing"
  # holds. Canonical GBP path = scripts/gen_gbp_posts.py (weekly batch -> daily approvals) +
  # scripts/post_daily_gbp.py (1/day). Re-enable only if you switch GBP to a weekly single post.
  active: false
